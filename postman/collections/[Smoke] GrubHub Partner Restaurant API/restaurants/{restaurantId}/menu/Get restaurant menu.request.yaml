type: http
name: Get restaurant menu
url: '{{baseUrl}}/restaurants/:restaurantId/menu'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: restaurantId
    value: rest-001
    description: Restaurant ID
scripts:
