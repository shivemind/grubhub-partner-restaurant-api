type: http
name: List active deliveries
url: '{{baseUrl}}/deliveries/active'
method: GET
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "count": 9496,
            "deliveries": [
              {
                "orderId": "string",
                "status": "in_transit",
                "driverName": "Aisha Williams",
                "driverPhone": "+1-312-555-0293",
                "estimatedArrival": "1981-01-16T17:41:42.648Z",
                "currentLocation": {
                  "lat": 41.8781,
                  "lng": -87.6298
                },
                "deliveryAddress": "string",
                "assignedAt": "1949-05-11T13:59:25.418Z",
                "deliveredAt": "1995-09-30T14:10:02.598Z",
                "customerName": "string",
                "restaurantId": "string"
              },
              {
                "orderId": "string",
                "status": "assigned",
                "driverName": "Aisha Williams",
                "driverPhone": "+1-312-555-0293",
                "estimatedArrival": "2016-06-22T10:29:38.734Z",
                "currentLocation": {
                  "lat": 41.8781,
                  "lng": -87.6298
                },
                "deliveryAddress": "string",
                "assignedAt": "2015-02-27T08:28:54.692Z",
                "deliveredAt": "1976-09-06T09:57:19.701Z",
                "customerName": "string",
