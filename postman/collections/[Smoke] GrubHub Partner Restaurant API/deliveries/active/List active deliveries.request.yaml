type: http
name: List active deliveries
url: '{{baseUrl}}/deliveries/active'
method: GET
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "count": 8094,
            "deliveries": [
              {
                "orderId": "string",
                "status": "delivered",
                "driverName": "Aisha Williams",
                "driverPhone": "+1-312-555-0293",
                "estimatedArrival": "1991-07-08T09:35:07.417Z",
                "currentLocation": {
                  "lat": 41.8781,
                  "lng": -87.6298
                },
                "deliveryAddress": "string",
                "assignedAt": "1994-12-12T01:58:07.450Z",
                "deliveredAt": "1997-08-01T09:13:31.534Z",
                "customerName": "string",
                "restaurantId": "string"
              },
              {
                "orderId": "string",
                "status": "assigned",
                "driverName": "Aisha Williams",
                "driverPhone": "+1-312-555-0293",
                "estimatedArrival": "1957-10-17T15:29:56.818Z",
                "currentLocation": {
                  "lat": 41.8781,
                  "lng": -87.6298
                },
                "deliveryAddress": "string",
                "assignedAt": "1988-08-13T15:09:02.605Z",
                "deliveredAt": "1973-08-07T14:47:12.435Z",
                "customerName": "string",
