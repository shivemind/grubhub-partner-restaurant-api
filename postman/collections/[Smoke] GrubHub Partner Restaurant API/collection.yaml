$schema: https://schema.postman.com/json/draft-2020-12/collection/v3.0.0/
type: collection
name: '[Smoke] GrubHub Partner Restaurant API'
description: |-
  REST API for managing partner restaurants, menus, orders, and delivery
  tracking on the GrubHub platform. Built to demonstrate Postman v12
  Enterprise capabilities.


  Contact Support:
   Name: GrubHub API Platform Team
   Email: api-platform@grubhub.com
id: 86f15d5d-0f2f-4442-be5e-7b2ff8addd69
auth:
  type: apikey
  credentials:
    - key: key
      value: X-API-Key
      type: string
    - key: value
      value: '{{apiKey}}'
      type: string
    - key: in
      value: header
      type: string
variables:
  - key: baseUrl
    value: https://api.grubhub.com/partner/v1
items:
  - ref: ./health/folder.yaml
  - ref: ./restaurants/folder.yaml
  - ref: ./menu/folder.yaml
  - ref: ./orders/folder.yaml
  - ref: ./deliveries/folder.yaml
  - ref: ./00 - Resolve Secrets.request.yaml
