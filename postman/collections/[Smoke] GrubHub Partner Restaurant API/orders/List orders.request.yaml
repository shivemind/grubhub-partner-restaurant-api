type: http
name: List orders
url: '{{baseUrl}}/orders?status=in_transit&restaurantId=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: in_transit
    description: Filter by order status
  - key: restaurantId
    value: string
    description: Filter by restaurant ID
scripts:
