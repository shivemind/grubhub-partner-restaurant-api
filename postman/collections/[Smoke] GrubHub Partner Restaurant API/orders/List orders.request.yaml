type: http
name: List orders
url: '{{baseUrl}}/orders?status=cancelled&restaurantId=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: cancelled
    description: Filter by order status
  - key: restaurantId
    value: string
    description: Filter by restaurant ID
