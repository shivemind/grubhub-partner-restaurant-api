type: http
name: Update a menu item
url: '{{baseUrl}}/menu/items/:itemId'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: itemId
    value: item-001
    description: Menu item ID
body:
  type: json
  content: |-
    {
      "price": 19.99,
      "available": true
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "item-001",
            "restaurantId": "rest-001",
            "name": "Classic Deep Dish Pizza",
            "description": "Buttercrust deep dish with sausage, mozzarella, and chunky tomato sauce",
            "price": 18.99,
            "category": "Entrees",
            "available": true
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Menu item updated
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
