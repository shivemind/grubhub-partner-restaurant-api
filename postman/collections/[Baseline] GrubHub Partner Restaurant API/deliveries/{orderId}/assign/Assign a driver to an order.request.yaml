type: http
name: Assign a driver to an order
url: '{{baseUrl}}/deliveries/:orderId/assign'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: order-003
    description: Order ID
body:
  type: json
  content: |-
    {
      "driverName": "Marcus Rivera",
      "driverPhone": "+1-312-555-0188"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "orderId": "string",
            "status": "in_transit",
            "driverName": "Aisha Williams",
            "driverPhone": "+1-312-555-0293",
            "estimatedArrival": "1976-01-08T15:22:14.275Z",
            "currentLocation": {
              "lat": 41.8781,
              "lng": -87.6298
            },
            "deliveryAddress": "string",
            "assignedAt": "1948-09-02T07:25:50.987Z",
            "deliveredAt": "2009-01-19T22:08:47.300Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Driver assigned
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Driver already assigned
