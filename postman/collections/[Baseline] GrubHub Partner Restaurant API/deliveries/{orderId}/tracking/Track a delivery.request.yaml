type: http
name: Track a delivery
url: '{{baseUrl}}/deliveries/:orderId/tracking'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: order-002
    description: Order ID to track
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "orderId": "string",
            "status": "in_transit",
            "driverName": "Aisha Williams",
            "driverPhone": "+1-312-555-0293",
            "estimatedArrival": "1976-01-08T15:22:14.275Z",
            "currentLocation": {
              "lat": 41.8781,
              "lng": -87.6298
            },
            "deliveryAddress": "string",
            "assignedAt": "1948-09-02T07:25:50.987Z",
            "deliveredAt": "2009-01-19T22:08:47.300Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Delivery tracking information
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
