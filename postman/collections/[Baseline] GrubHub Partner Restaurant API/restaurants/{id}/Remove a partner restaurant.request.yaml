type: http
name: Remove a partner restaurant
url: '{{baseUrl}}/restaurants/:id'
method: DELETE
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: rest-001
    description: Restaurant ID
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "message": "string",
            "id": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Restaurant removed
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
