type: http
name: Service health check
url: '{{baseUrl}}/health'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "healthy",
            "service": "GrubHub Partner API",
            "version": "1.0.0",
            "uptime": 3600.5,
            "timestamp": "2026-03-17T12:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is healthy
