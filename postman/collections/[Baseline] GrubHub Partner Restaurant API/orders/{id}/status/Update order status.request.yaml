          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "Not Found",
            "message": "Resource not found"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
