type: http
name: Update order status
url: '{{baseUrl}}/orders/:id/status'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: order-001
    description: Order ID
body:
  type: json
  content: |-
    {
      "status": "preparing"
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "order-001",
            "restaurantId": "rest-001",
            "customerName": "Sarah Johnson",
            "items": [
              {
                "menuItemId": "item-001",
                "name": "Classic Deep Dish Pizza",
                "quantity": 1,
                "price": 18.99
              },
              {
                "menuItemId": "item-001",
                "name": "Classic Deep Dish Pizza",
                "quantity": 1,
                "price": 18.99
              }
            ],
            "status": "preparing",
            "total": 36.97,
            "deliveryAddress": "233 S Wacker Dr, Chicago, IL 60606",
            "createdAt": "1980-03-15T19:24:37.470Z",
            "updatedAt": "2019-07-24T10:42:09.917Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order status updated
  - response:
      statusCode: 400
      statusText: Bad Request
