type: http
name: List orders
url: '{{baseUrl}}/orders?status=delivered&restaurantId=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: delivered
    description: Filter by order status
  - key: restaurantId
    value: string
    description: Filter by restaurant ID
